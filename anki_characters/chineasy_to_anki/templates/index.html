<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chineasy & Yoyo Chinese to Anki Studio</title>
    <style>
        :root {
            --bg: #282c34;
            --panel: #21252b;
            --border: #383e4a;
            --text: #abb2bf;
            --blue: #61afef;
            --green: #98c379;
            --red: #e06c75;
            --cyan: #56b6c2;
            --purple: #c678dd;
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
            font-size: 13px;
            margin: 0;
            padding: 24px;
        }

        .window {
            max-width: 850px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--panel);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }

        .section-panel {
            display: none;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .section-panel.active {
            display: block;
        }

        .row {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--text);
            font-weight: 500;
        }

        .field-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 10px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 4px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--blue);
        }

        button {
            background: #3b404d;
            color: var(--text);
            border: 1px solid var(--border);
            padding: 8px 14px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
        }

        button:hover {
            background: #454c5c;
            color: #fff;
        }

        .btn-primary {
            background: var(--blue);
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: #4fa0e3;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 6px;
            padding: 24px;
            text-align: center;
            background: var(--bg);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--blue);
            background: #2c313a;
        }

        .drop-zone-text {
            color: var(--text);
            font-size: 13px;
        }

        .folder-list {
            margin-top: 8px;
            font-size: 12px;
        }

        .folder-link {
            display: inline-block;
            color: var(--blue);
            margin-right: 12px;
            cursor: pointer;
            text-decoration: none;
        }

        .folder-link:hover {
            text-decoration: underline;
        }

        .folder-link.processed {
            color: #5c6370;
        }

        #terminal {
            background: var(--panel);
            color: var(--green);
            font-family: "SF Mono", Menlo, Monaco, monospace;
            font-size: 12px;
            padding: 10px;
            height: 160px;
            overflow-y: auto;
            border: 1px solid var(--border);
            white-space: pre-wrap;
            border-radius: 4px;
            line-height: 1.4;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .card-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .hanzi {
            font-size: 36px;
            color: var(--red);
            font-weight: 600;
        }

        .pinyin {
            font-size: 14px;
            color: var(--cyan);
            margin: 4px 0;
        }

        .english {
            color: var(--green);
            font-weight: 500;
            margin-bottom: 4px;
        }

        .story {
            font-size: 11px;
            color: #5c6370;
            margin-bottom: 8px;
        }

        .mnemo-img {
            max-width: 120px;
            max-height: 120px;
            display: block;
            margin: 0 auto;
        }

        .btn-audio {
            background: transparent;
            border: 1px solid var(--cyan);
            color: var(--cyan);
            padding: 1px 6px;
            font-size: 11px;
            border-radius: 3px;
            margin-left: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="header">
            <span>Chineasy & Yoyo Chinese to Anki Studio</span>
            <button id="btn-sync-obsidian" onclick="syncObsidian()" style="background:#0284c7; color:#fff; border:none;">Synchroniser vers Obsidian</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('chineasy')">Chineasy (Captures)</button>
            <button class="tab-btn" onclick="switchTab('yoyo')">Yoyo Chinese (PDF)</button>
        </div>

        <!-- Section Chineasy -->
        <div id="panel-chineasy" class="section-panel active">
            <div class="row">
                <label for="folder-input">Dossier de captures Chineasy</label>
                <div class="field-group">
                    <input type="text" id="folder-input" value="captures" placeholder="captures/...">
                    <button id="btn-start-chineasy" class="btn-primary" onclick="startChineasyProcessing()">Lancer le traitement</button>
                </div>
                <div class="folder-list" id="folder-list"></div>
            </div>
        </div>

        <!-- Section Yoyo Chinese -->
        <div id="panel-yoyo" class="section-panel">
            <div class="row">
                <label>Glisser-déposer un cours PDF Yoyo Chinese</label>
                <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input-pdf').click()">
                    <div class="drop-zone-text"> Glissez-déposez votre fichier .pdf ici ou cliquez pour parcourir</div>
                    <input type="file" id="file-input-pdf" accept=".pdf" style="display:none;" onchange="handleFileSelect(this.files)">
                </div>
            </div>

            <div class="row">
                <label for="pdf-path-input">Ou sélectionner un fichier PDF local</label>
                <div class="field-group">
                    <input type="text" id="pdf-path-input" placeholder="/chemin/vers/votre/cours.pdf">
                    <button id="btn-start-yoyo" class="btn-primary" onclick="startYoyoProcessing()">Convertir PDF & Exporter Anki</button>
                </div>
                <div class="folder-list" id="pdf-list"></div>
            </div>
        </div>

        <div class="row">
            <label>Console de traitement en direct</label>
            <div id="terminal"></div>
        </div>

        <div class="row">
            <label>Galerie des cartes créées</label>
            <div class="cards-grid" id="cards-grid"></div>
        </div>
    </div>

    <script>
        fetchFolders();
        fetchPdfFiles();

        function switchTab(mode) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section-panel').forEach(p => p.classList.remove('active'));
            if (mode === 'chineasy') {
                event.target.classList.add('active');
                document.getElementById('panel-chineasy').classList.add('active');
            } else {
                event.target.classList.add('active');
                document.getElementById('panel-yoyo').classList.add('active');
            }
        }

        function fetchFolders() {
            fetch('/api/folders')
                .then(res => res.json())
                .then(folders => {
                    const container = document.getElementById('folder-list');
                    container.innerHTML = '';
                    folders.forEach(f => {
                        const link = document.createElement('span');
                        link.className = `folder-link ${f.is_processed ? 'processed' : ''}`;
                        link.textContent = f.name + (f.is_processed ? ' [traité]' : '');
                        link.onclick = () => { document.getElementById('folder-input').value = f.path; };
                        container.appendChild(link);
                    });
                });
        }

        function fetchPdfFiles() {
            fetch('/api/pdf_files')
                .then(res => res.json())
                .then(files => {
                    const container = document.getElementById('pdf-list');
                    container.innerHTML = '';
                    files.forEach(f => {
                        const link = document.createElement('span');
                        link.className = 'folder-link';
                        link.textContent = f.name;
                        link.onclick = () => { document.getElementById('pdf-path-input').value = f.path; };
                        container.appendChild(link);
                    });
                    if (files.length > 0 && !document.getElementById('pdf-path-input').value) {
                        document.getElementById('pdf-path-input').value = files[0].path;
                    }
                });
        }

        // Drag and Drop handlers
        const dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files);
            }
        });

        function handleFileSelect(files) {
            if (!files || files.length === 0) return;
            const file = files[0];
            const formData = new FormData();
            formData.append('file', file);

            const terminal = document.getElementById('terminal');
            terminal.textContent += `\n[Upload] Envoi du fichier ${file.name}...\n`;

            fetch('/api/upload_pdf', {
                method: 'POST',
                body: formData
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    terminal.textContent += `[Upload Succès] Fichier sauvegardé : ${data.path}\n`;
                    document.getElementById('pdf-path-input').value = data.path;
                    fetchPdfFiles();
                } else {
                    terminal.textContent += `[Upload Erreur] ${data.error}\n`;
                }
            });
        }

        function startChineasyProcessing() {
            const folder = document.getElementById('folder-input').value.trim();
            if (!folder) return;
            runSSE(`/api/process?folder=${encodeURIComponent(folder)}`, 'btn-start-chineasy');
        }

        function startYoyoProcessing() {
            const pdfPath = document.getElementById('pdf-path-input').value.trim();
            if (!pdfPath) return;
            runSSE(`/api/process_pdf?pdf_path=${encodeURIComponent(pdfPath)}`, 'btn-start-yoyo');
        }

        function runSSE(url, btnId) {
            const btn = document.getElementById(btnId);
            const terminal = document.getElementById('terminal');
            const origText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Traitement...';
            terminal.textContent = '';

            const es = new EventSource(url);

            es.onmessage = function(e) {
                const data = JSON.parse(e.data);
                if (data.type === 'log') {
                    terminal.textContent += data.text + '\n';
                    terminal.scrollTop = terminal.scrollHeight;
                } else if (data.type === 'result') {
                    es.close();
                    btn.disabled = false;
                    btn.textContent = origText;
                    fetchFolders();
                    fetchPdfFiles();
                    renderCards(data.cards);
                } else if (data.type === 'error') {
                    es.close();
                    btn.disabled = false;
                    btn.textContent = origText;
                    terminal.textContent += '\nErreur: ' + data.text;
                }
            };

            es.onerror = function() {
                es.close();
                btn.disabled = false;
                btn.textContent = origText;
            };
        }

        function playAudio(url) {
            new Audio(url).play();
        }

        function syncObsidian() {
            const btn = document.getElementById('btn-sync-obsidian');
            const terminal = document.getElementById('terminal');
            btn.disabled = true;
            btn.textContent = 'Synchronisation...';
            terminal.textContent += '\n[Obsidian] Lancement de la synchronisation vers Obsidian...\n';
            
            fetch('/api/export_obsidian', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deck_name: 'chinois::chineasy_characters' })
            })
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.textContent = 'Synchroniser vers Obsidian';
                if (data.success) {
                    terminal.textContent += `[Obsidian] Succès ! ${data.exported_count} note(s) exportée(s).\n`;
                } else {
                    terminal.textContent += `[Obsidian Erreur] ${data.error}\n`;
                }
                terminal.scrollTop = terminal.scrollHeight;
            });
        }

        function renderCards(cards) {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';
            if (!cards || cards.length === 0) return;
            cards.forEach(c => {
                const item = document.createElement('div');
                item.className = 'card-box';
                const audioUrl = c.audio_filename ? `/audio/${c.audio_filename}` : '';
                const imgUrl = c.img_filename ? `/media/${c.img_filename}` : '';
                item.innerHTML = `
                    <div class="hanzi">${c.hanzi || ''}</div>
                    <div class="pinyin">${c.pinyin || ''} ${audioUrl ? `<button class="btn-audio" onclick="playAudio('${audioUrl}')">Audio</button>` : ''}</div>
                    <div class="english">${c.english || ''}</div>
                    <div class="story">${c.story || ''}</div>
                    ${imgUrl ? `<img src="${imgUrl}" class="mnemo-img">` : ''}
                `;
                grid.appendChild(item);
            });
        }
    </script>
</body>
</html>
